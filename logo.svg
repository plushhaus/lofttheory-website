<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 90" role="img" aria-label="Loft Theory — Orange County">
  <defs>
    <linearGradient id="cushion" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e08348"/>
      <stop offset="100%" stop-color="#c2530f"/>
    </linearGradient>
  </defs>

  <!-- Mid-century chair mark -->
  <g transform="translate(112, 2)">
    <!-- back rest cushion -->
    <path d="M14 6 Q14 2 18 2 L36 2 Q40 2 40 6 L40 22 Q40 26 36 26 L18 26 Q14 26 14 22 Z"
          fill="url(#cushion)"/>
    <!-- back rest highlight -->
    <path d="M16 6 Q16 4 19 4 L36 4 Q39 4 39 7"
          stroke="#f0a070" stroke-width="0.6" fill="none" opacity="0.6"/>

    <!-- left arm/wood frame curve -->
    <path d="M6 14 Q6 32 14 32 L42 32 Q50 32 50 14"
          stroke="#3d2817" stroke-width="2.6" fill="none" stroke-linecap="round"/>

    <!-- seat cushion -->
    <path d="M10 24 Q10 22 13 22 L43 22 Q46 22 46 24 L46 32 Q46 34 43 34 L13 34 Q10 34 10 32 Z"
          fill="url(#cushion)"/>

    <!-- front legs (splayed slightly outward — mid-century style) -->
    <line x1="12" y1="34" x2="9"  y2="46" stroke="#3d2817" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="44" y1="34" x2="47" y2="46" stroke="#3d2817" stroke-width="2.4" stroke-linecap="round"/>
    <!-- back legs (visible behind, shorter splay) -->
    <line x1="18" y1="34" x2="16" y2="44" stroke="#2a1d12" stroke-width="2"  stroke-linecap="round"/>
    <line x1="38" y1="34" x2="40" y2="44" stroke="#2a1d12" stroke-width="2"  stroke-linecap="round"/>

    <!-- subtle floor shadow -->
    <ellipse cx="28" cy="48" rx="22" ry="1.6" fill="#3d2817" opacity="0.18"/>
  </g>

  <!-- LOFT THEORY wordmark -->
  <text x="140" y="72"
        text-anchor="middle"
        font-family="'Playfair Display', 'Cormorant Garamond', Georgia, serif"
        font-size="22"
        font-weight="700"
        fill="#2a1d12"
        letter-spacing="2.4">LOFT THEORY</text>

  <!-- ORANGE COUNTY subline -->
  <text x="140" y="86"
        text-anchor="middle"
        font-family="'Inter', -apple-system, sans-serif"
        font-size="7"
        font-weight="600"
        fill="#c2530f"
        letter-spacing="3.2">ORANGE COUNTY</text>
</svg>
